name: healthy_living_shared
description: "This will contain all the shared source code for healthy living app across multiple packages/plugins."
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.7.2 <4.0.0"
  flutter: ">=3.29.3"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_dotenv: ^5.2.1
  get_it: ^7.7.0
  injectable: ^2.4.2
  uuid: ^4.5.1
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  connectivity_plus: ^6.1.5
  webview_flutter: ^4.13.0
  country_code_picker: ^3.3.0
  share_plus: ^11.1.0
  url_launcher: ^6.3.2
  go_router: ^16.0.0
  substring_highlight: ^1.0.33
  pdfrx: ^1.3.5
  json_annotation: ^4.9.0
  path: ^1.9.0
  path_provider: ^2.1.5
  mobkit_dashed_border: ^0.0.8
  flutter_branch_sdk: ^8.10.0
  purchases_flutter: ^9.9.1
  purchases_ui_flutter: ^9.9.2
  popover: ^0.3.1
  google_sign_in: ^7.1.1
  firebase_core: ^3.13.0
  firebase_analytics: ^11.4.5
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^19.5.0
  rxdart: ^0.28.0

  design_system:
    path: ../../shared_packages/design_system

  network:
    path: ../../shared_packages/network

  storage:
    path: ../../shared_packages/storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.3
  mockito: ^5.4.4
  bloc_test: ^10.0.0
  injectable_generator: ^2.6.1
  freezed: ^3.1.0
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
