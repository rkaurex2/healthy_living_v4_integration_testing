name: healthy_living_auth
description: "Provides login and sign up related features."
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.7.2 <4.0.0"
  flutter: ">=3.29.3"

dependencies:
  flutter:
    sdk: flutter

  get_it: ^7.7.0
  injectable: ^2.4.2
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^7.1.1
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  go_router: ^16.0.0
  purchases_flutter: ^9.9.1
  flutter_localizations:
    sdk: flutter

  design_system:
    path: ../../shared_packages/design_system

  network:
    path: ../../shared_packages/network

  storage:
    path: ../../shared_packages/storage

  healthy_living_shared:
    path: ../../healthy_living_packages/healthy_living_shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.3
  injectable_generator: ^2.6.1
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  mockito: ^5.4.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/