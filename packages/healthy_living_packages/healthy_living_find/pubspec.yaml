name: healthy_living_find
description: "Provides search related features."
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.7.2 <4.0.0"
  flutter: ">=3.29.3"

dependencies:
  flutter:
    sdk: flutter

  get_it: ^7.7.0
  injectable: ^2.4.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_bloc: ^9.1.1
  go_router: ^16.0.0
  firebase_analytics: ^11.4.5

  design_system:
    path: ../../shared_packages/design_system
  healthy_living_shared:
    path: ../healthy_living_shared
  network:
    path: ../../shared_packages/network

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.3
  injectable_generator: ^2.6.1
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  mockito: ^5.4.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
