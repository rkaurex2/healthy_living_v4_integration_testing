name: app_workspace
ide:
  intellij:
    enabled: true
    moduleNamePrefix: 'ewg_'

packages:
  - 'apps/*'
  - 'packages/*'
  - 'packages/*/*'
  - 'packages/*/*/*'

command:
  bootstrap:
    hooks:
      post: |
        # Install git hooks for stale mock detection
        if [ -d ".githooks" ]; then
          git config core.hooksPath .githooks 2>/dev/null || true
          echo "✓ Git hooks installed (.githooks/pre-commit)"
        fi
    environment:
      sdk: '>=3.7.2 <4.0.0'
      flutter: '>=3.29.3'

    dependencies:
      intl: any
      dio: ^5.2.1
      get_it: ^7.7.0
      injectable: ^2.4.2
      widgetbook: ^3.14.3
      firebase_analytics: ^11.4.5
      sign_in_with_apple: ^7.0.1
      google_sign_in: ^7.1.1
      flutter_bloc: ^9.1.1
      flutter_svg: ^2.2.0
      go_router: ^16.0.0
      freezed_annotation: ^3.1.0
      uuid: ^4.5.1
      flutter_dotenv: ^5.2.1
      shimmer: ^3.0.0
      webview_flutter: ^4.13.0
      country_code_picker: ^3.3.0
      json_annotation: ^4.9.0
      url_launcher: ^6.3.2
      pdfrx: ^1.3.5
      camera: ^0.11.1
      flutter_riverpod: ^2.5.1
      image: ^4.1.3
      google_mlkit_commons: ^0.9.0
      google_mlkit_barcode_scanning: ^0.13.0
      permission_handler: ^12.0.1
      path: ^1.9.0
      path_provider: ^2.1.5
      dart_mappable: ^4.3.0
      image_picker: ^1.1.2
      mobkit_dashed_border: ^0.0.8
      flutter_branch_sdk: ^8.10.0
      purchases_flutter: ^9.9.1
      purchases_ui_flutter: ^9.9.2
      popover: ^0.3.1
      firebase_core: ^3.13.0
      firebase_crashlytics: ^4.3.5
      firebase_messaging: ^15.2.10
      flutter_local_notifications: ^19.5.0
      rxdart: ^0.28.0
      app_links: ^6.4.1

      flutter_localizations:
        sdk: flutter


    dev_dependencies:
      flutter_test:
        sdk: flutter
      build_runner: ^2.5.3
      flutter_lints: ^5.0.0
      melos: ^6.3.2
      mockito: ^5.4.4
      bloc_test: ^10.0.0
      injectable_generator: ^2.6.1
      freezed: ^3.1.0
      json_serializable: ^6.9.5
      dart_mappable_builder: ^4.3.1

scripts:
  get:
    description: Runs `flutter pub get` in all of the packages.
    run: melos exec flutter pub get --no-example

  gen-l10n:
    description: Runs the "flutter gen-l10n" command in all of the packages, if applicable. Note that the "l10n" package must be added in the "lib" folder as per current setup of this command.
    run: melos exec --dir-exists="lib/l10n" flutter gen-l10n

  flutter-analyze:
    description: Runs `flutter analyze` in all packages.
    run: melos exec -- flutter analyze --no-fatal-infos --no-fatal-warnings

  flutter-clean:
    description: Runs `flutter clean` in all of the packages.
    run: melos exec flutter clean

  test-coverage:
    description: Run unit test across all the packages which contains "test" directory.
    run: melos exec --dir-exists="test" -- flutter test --coverage

  build_mocks:
    description: Generate mock files for all packages with a build_runner dependency.
    run: melos exec --depends-on="build_runner" -- dart run build_runner build -d

  integration-smoke:
    description: Run integration smoke tests (requires staging environment + .env.test).
    run: cd apps/healthy_living && flutter test integration_test/ --tags=smoke --dart-define=ENVIRONMENT=stage --dart-define=INTEGRATION_TESTS_APPROVED=true

  integration-full:
    description: Run full integration regression (requires staging environment + .env.test).
    run: cd apps/healthy_living && flutter test integration_test/ --tags=full --dart-define=ENVIRONMENT=stage --dart-define=INTEGRATION_TESTS_APPROVED=true

  dart-fix:
    description: Runs dart fix command on all packages.
    run: melos exec dart fix --apply